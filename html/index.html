<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購入申請システム</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone (JSX変換用) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        'fade-in-down': {
                            '0%': { opacity: '0', transform: 'translateY(-10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                    animation: {
                        'fade-in-down': 'fade-in-down 0.3s ease-out forwards',
                    },
                },
            },
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // アイコンコンポーネント（簡易SVG）
        const FileText = ({ size = 24, className = '' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
        );

        const X = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const Filter = ({ size = 24, className = '' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </svg>
        );

        const Plus = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        const TrendingUp = ({ size = 24, className = '' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );

        const Clock = ({ size = 24, className = '' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        );

        const CheckCircle = ({ size = 24, className = '' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const BarChart3 = ({ size = 24, className = '' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M3 3v18h18"></path>
                <path d="M18 17V9"></path>
                <path d="M13 17V5"></path>
                <path d="M8 17v-3"></path>
            </svg>
        );

        const FileCheck = ({ size = 24, className = '' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <polyline points="9 15 11 17 15 13"></polyline>
            </svg>
        );

        const ChevronDown = ({ size = 24, className = '' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        );

        const ChevronUp = ({ size = 24, className = '' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
        );

        // メインアプリ
        function App() {
            const [apps, setApps] = useState([]);
            const [stats, setStats] = useState({ total: 0, pending: 0, approved: 0, rejected: 0, totalApprovedAmount: 0 });
            const [filter, setFilter] = useState('all');
            const [selectedApp, setSelectedApp] = useState(null);
            const [comment, setComment] = useState('');
            const [loading, setLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState({ email: '', name: '' });
            const [isNewAppFormOpen, setIsNewAppFormOpen] = useState(false);
            const [isPreviewingPdf, setIsPreviewingPdf] = useState(false);
            const [approvers, setApprovers] = useState([]);
            const [isDecisionLoading, setIsDecisionLoading] = useState(false);
            const [isStatsCollapsed, setIsStatsCollapsed] = useState(false);

            const [sortConfig, setSortConfig] = useState({ key: 'timestamp', direction: 'descending' });
            // トースト通知
            const [toasts, setToasts] = useState([]);
            const pushToast = (type, message) => {
                const id = Date.now() + Math.random();
                setToasts(prev => [...prev, { id, type, message }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };

            // タブ表示切替（未対応/承認/却下の表示・非表示）
            const defaultVisibleTabs = { all: true, '未対応': true, '承認': true, '却下': true };
            const [visibleTabs, setVisibleTabs] = useState(() => {
                try {
                    const saved = localStorage.getItem('visibleTabs');
                    return saved ? JSON.parse(saved) : defaultVisibleTabs;
                } catch (e) {
                    return defaultVisibleTabs;
                }
            });
            const [isTabConfigOpen, setIsTabConfigOpen] = useState(false);

            useEffect(() => {
                try { localStorage.setItem('visibleTabs', JSON.stringify(visibleTabs)); } catch (e) { }
                if (filter !== 'all' && !visibleTabs[filter]) {
                    setFilter('all');
                }
            }, [visibleTabs]);

            useEffect(() => {
                loadData();
                loadCurrentUser();
                loadApprovers();
            }, []);

            const loadApprovers = () => {
                google.script.run
                    .withSuccessHandler(setApprovers)
                    .withFailureHandler(console.error)
                    .getApproverList();
            };

            const getDriveFileId = (url) => {
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                return match ? match[1] : null;
            };

            const loadData = () => {
                setLoading(true);

                // GAS関数を呼び出し
                google.script.run
                    .withSuccessHandler((data) => {
                        const appsData = data || []; // nullの場合に空の配列を使用
                        setApps(appsData);
                        calculateStats(appsData);
                        setLoading(false);
                    })
                    .withFailureHandler((error) => {
                        console.error('データ取得エラー:', error);
                        pushToast('error', 'データの取得に失敗しました');
                        setLoading(false);
                    })
                    .getAllApplications();
            };

            const loadCurrentUser = () => {
                google.script.run
                    .withSuccessHandler(setCurrentUser)
                    .withFailureHandler(console.error)
                    .getCurrentUser();
            };

            const calculateStats = (applications) => {
                const total = applications.length;
                const pending = applications.filter(a => a.status === '未対応').length;
                const approved = applications.filter(a => a.status === '承認').length;
                const rejected = applications.filter(a => a.status === '却下').length;
                const totalApprovedAmount = applications
                    .filter(a => a.status === '承認')
                    .reduce((sum, a) => sum + a.totalPrice, 0);

                setStats({ total, pending, approved, rejected, totalApprovedAmount });
            };

            const handleApprove = () => {
                setIsDecisionLoading(true);
                google.script.run
                    .withSuccessHandler(() => {
                        const newApps = apps.map(app =>
                            app.rowIndex === selectedApp.rowIndex
                                ? { ...app, status: '承認', approver: currentUser.email, approvalDate: new Date().toISOString() }
                                : app
                        );
                        setApps(newApps);
                        calculateStats(newApps);
                        setSelectedApp(null);
                        setComment('');
                        pushToast('success', '承認しました');
                        setIsDecisionLoading(false);
                    })
                    .withFailureHandler((error) => {
                        console.error('承認エラー:', error);
                        pushToast('error', '承認に失敗しました');
                        setIsDecisionLoading(false);
                    })
                    .approveApplication(selectedApp.rowIndex, currentUser.email, comment);
            };

            const handleReject = () => {
                setIsDecisionLoading(true);
                google.script.run
                    .withSuccessHandler(() => {
                        const newApps = apps.map(app =>
                            app.rowIndex === selectedApp.rowIndex
                                ? { ...app, status: '却下', approver: currentUser.email, approvalDate: new Date().toISOString() }
                                : app
                        );
                        setApps(newApps);
                        calculateStats(newApps);
                        setSelectedApp(null);
                        setComment('');
                        pushToast('success', '却下しました');
                        setIsDecisionLoading(false);
                    })
                    .withFailureHandler((error) => {
                        console.error('却下エラー:', error);
                        pushToast('error', '却下に失敗しました');
                        setIsDecisionLoading(false);
                    })
                    .rejectApplication(selectedApp.rowIndex, currentUser.email, comment);
            };

            const handleNewApplication = (data, onComplete) => {
                google.script.run
                    .withSuccessHandler((newApp) => {
                        const newApps = [newApp, ...apps];
                        setApps(newApps);
                        calculateStats(newApps);
                        setIsNewAppFormOpen(false);
                        pushToast('success', '新規申請が完了しました');
                        onComplete();
                    })
                    .withFailureHandler((error) => {
                        console.error('新規申請エラー:', error);
                        pushToast('error', '新規申請に失敗しました');
                        onComplete();
                    })
                    .addApplication(data);
            };

            const handleSort = (key) => {
                let direction = 'ascending';
                if (sortConfig.key === key && sortConfig.direction === 'ascending') {
                    direction = 'descending';
                }
                setSortConfig({ key, direction });
            };

            const sortedAndFilteredApps = React.useMemo(() => {
                let sortableItems = filter === 'all'
                ? apps
                : apps.filter(app => app.status === filter);

                if (sortConfig.key !== null) {
                    sortableItems.sort((a, b) => {
                        if (a[sortConfig.key] < b[sortConfig.key]) {
                            return sortConfig.direction === 'ascending' ? -1 : 1;
                        }
                        if (a[sortConfig.key] > b[sortConfig.key]) {
                            return sortConfig.direction === 'ascending' ? 1 : -1;
                        }
                        return 0;
                    });
                }
                return sortableItems;
            }, [apps, filter, sortConfig]);

            const formatDate = (date) => {
                if (!date) return '-';
                const d = new Date(date);
                return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
            };

            const statusColors = {
                '未対応': {
                    style: 'bg-amber-100 text-amber-800 border-amber-300',
                    icon: <Clock size={14} className="mr-1.5" />
                },
                '承認': {
                    style: 'bg-emerald-100 text-emerald-800 border-emerald-300',
                    icon: <CheckCircle size={14} className="mr-1.5" />
                },
                '却下': {
                    style: 'bg-rose-100 text-rose-800 border-rose-300',
                    icon: <X size={14} className="mr-1.5" />
                },
                '購入済み': {
                    style: 'bg-blue-100 text-blue-800 border-blue-300',
                    icon: <FileCheck size={14} className="mr-1.5" />
                },
                '完了': {
                    style: 'bg-gray-100 text-gray-800 border-gray-300',
                    icon: <FileText size={14} className="mr-1.5" />
                }
            };

            const StatusBadge = ({ status }) => {
                const config = statusColors[status] || statusColors['完了'];
                return (
                    <span className={`inline-flex items-center justify-center px-3 py-1 rounded-full text-xs font-semibold border ${config.style}`}>
                        {config.icon}
                        <span>{status}</span>
                    </span>
                );
            };




            if (loading) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-stone-100 flex items-center justify-center">
                        <div className="text-2xl text-stone-600">読み込み中...</div>
                    </div>
                );
            }

            return (
                <>
                    <div className="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-stone-100">
                    {/* Toasts */}
                    <div className="fixed top-4 right-4 z-50 space-y-2" aria-live="polite" aria-atomic="true">
                        {toasts.map(t => (
                            <div key={t.id} className={`px-4 py-3 rounded-lg shadow-lg border text-sm ${t.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
                                    t.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-800' :
                                        'bg-stone-50 border-stone-200 text-stone-800'
                                }`}>
                                {t.message}
                            </div>
                        ))}
                    </div>
                    {/* ヘッダー */}
                    <header className="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b border-stone-200 shadow-sm">
                        <div className="px-8 py-4 flex items-center justify-between">
                            <div>
                                <h1 className="text-2xl font-bold text-stone-800">購入申請システム</h1>
                                <p className="text-sm text-stone-600 mt-1">効率的な予算管理と承認フロー</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-3 px-4 py-2 bg-stone-100 rounded-xl border border-stone-200">
                                    <div className="w-8 h-8 bg-gradient-to-br from-amber-600 to-orange-700 rounded-full flex items-center justify-center text-white text-sm font-bold">
                                        {currentUser.name.charAt(0).toUpperCase()}
                                    </div>
                                    <span className="text-stone-700 text-sm">{currentUser.email}</span>
                                </div>
                                <button
                                    onClick={() => setIsNewAppFormOpen(true)}
                                    className="flex items-center gap-2 px-4 py-3 bg-gradient-to-r from-amber-600 to-orange-600 text-white rounded-xl font-semibold hover:from-amber-700 hover:to-orange-700 transition-all shadow-lg"
                                >
                                    <Plus size={16} />
                                    <span>新規申請</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="p-8">
                        {/* 統計カード - 折りたたみ可能 */}
                        <div className="mb-8">
                            {/* ヘッダーと折りたたみボタン */}
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-lg font-semibold text-stone-700">統計サマリー</h2>
                                <button
                                    onClick={() => setIsStatsCollapsed(!isStatsCollapsed)}
                                    className="flex items-center gap-2 px-4 py-2 bg-white/80 backdrop-blur border border-stone-200 rounded-xl text-stone-600 font-medium text-sm shadow-sm hover:shadow-md hover:-translate-y-px active:scale-95 transition-all duration-200"
                                >
                                    <span>{isStatsCollapsed ? '詳細表示' : 'コンパクト表示'}</span>
                                    <ChevronUp
                                        size={16}
                                        className={`transition-transform duration-300 ${isStatsCollapsed ? 'rotate-180' : ''}`}
                                    />
                                </button>
                            </div>

                            {/* コンパクトサマリー（折りたたみ時） */}
                            {isStatsCollapsed && (
                                <div className="bg-white/80 backdrop-blur border border-stone-200 rounded-xl p-4 shadow-md">
                                    <div className="flex items-center justify-around gap-4">
                                        <div className="flex items-center gap-2">
                                            <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg flex items-center justify-center">
                                                <FileCheck className="text-white" size={16} />
                                            </div>
                                            <div>
                                                <div className="text-xl font-bold text-stone-800">{stats.total}</div>
                                                <div className="text-xs text-stone-500">全申請</div>
                                            </div>
                                        </div>

                                        <div className="w-px h-10 bg-stone-200"></div>

                                        <div className="flex items-center gap-2">
                                            <div className="w-8 h-8 bg-gradient-to-br from-amber-500 to-orange-600 rounded-lg flex items-center justify-center">
                                                <Clock className="text-white" size={16} />
                                            </div>
                                            <div>
                                                <div className="text-xl font-bold text-stone-800">{stats.pending}</div>
                                                <div className="text-xs text-stone-500">未対応</div>
                                            </div>
                                        </div>

                                        <div className="w-px h-10 bg-stone-200"></div>

                                        <div className="flex items-center gap-2">
                                            <div className="w-8 h-8 bg-gradient-to-br from-emerald-500 to-green-600 rounded-lg flex items-center justify-center">
                                                <CheckCircle className="text-white" size={16} />
                                            </div>
                                            <div>
                                                <div className="text-xl font-bold text-stone-800">{stats.approved}</div>
                                                <div className="text-xs text-stone-500">承認済み</div>
                                            </div>
                                        </div>

                                        <div className="w-px h-10 bg-stone-200"></div>

                                        <div className="flex items-center gap-2">
                                            <div className="w-8 h-8 bg-gradient-to-br from-amber-600 to-orange-700 rounded-lg flex items-center justify-center">
                                                <BarChart3 className="text-white" size={16} />
                                            </div>
                                            <div>
                                                <div className="text-xl font-bold text-stone-800">¥{(stats.totalApprovedAmount / 10000).toFixed(0)}万</div>
                                                <div className="text-xs text-stone-500">承認金額</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 詳細統計カード */}
                            <div
                                className={`grid grid-cols-4 gap-6 transition-all duration-300 overflow-hidden ${isStatsCollapsed ? 'max-h-0 opacity-0' : 'max-h-96 opacity-100'
                                    }`}
                            >
                                <div className="bg-white/80 backdrop-blur border border-stone-200 rounded-2xl p-6 shadow-lg hover:shadow-xl transition-shadow">
                                    <div className="flex items-center justify-between mb-4">
                                        <div className="w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl flex items-center justify-center shadow-md">
                                            <FileCheck className="text-white" size={24} />
                                        </div>
                                        <TrendingUp className="text-blue-500" size={20} />
                                    </div>
                                    <div className="text-3xl font-bold text-stone-800 mb-1">{stats.total}</div>
                                    <div className="text-sm text-stone-600">全申請</div>
                                </div>

                                <div className="bg-white/80 backdrop-blur border border-stone-200 rounded-2xl p-6 shadow-lg hover:shadow-xl transition-shadow">
                                    <div className="flex items-center justify-between mb-4">
                                        <div className="w-12 h-12 bg-gradient-to-br from-amber-500 to-orange-600 rounded-xl flex items-center justify-center shadow-md">
                                            <Clock className="text-white" size={24} />
                                        </div>
                                        <div className="text-xs px-2 py-1 bg-amber-100 text-amber-700 rounded-full font-semibold">
                                            要対応
                                        </div>
                                    </div>
                                    <div className="text-3xl font-bold text-stone-800 mb-1">{stats.pending}</div>
                                    <div className="text-sm text-stone-600">未対応</div>
                                </div>

                                <div className="bg-white/80 backdrop-blur border border-stone-200 rounded-2xl p-6 shadow-lg hover:shadow-xl transition-shadow">
                                    <div className="flex items-center justify-between mb-4">
                                        <div className="w-12 h-12 bg-gradient-to-br from-emerald-500 to-green-600 rounded-xl flex items-center justify-center shadow-md">
                                            <CheckCircle className="text-white" size={24} />
                                        </div>
                                        <div className="text-xs text-emerald-600 font-semibold">+{stats.approved}</div>
                                    </div>
                                    <div className="text-3xl font-bold text-stone-800 mb-1">{stats.approved}</div>
                                    <div className="text-sm text-stone-600">承認済み</div>
                                </div>

                                <div className="bg-white/80 backdrop-blur border border-stone-200 rounded-2xl p-6 shadow-lg hover:shadow-xl transition-shadow">
                                    <div className="flex items-center justify-between mb-4">
                                        <div className="w-12 h-12 bg-gradient-to-br from-amber-600 to-orange-700 rounded-xl flex items-center justify-center shadow-md">
                                            <BarChart3 className="text-white" size={24} />
                                        </div>
                                    </div>
                                    <div className="text-3xl font-bold text-stone-800 mb-1">
                                        ¥{stats.totalApprovedAmount.toLocaleString()}
                                    </div>
                                    <div className="text-sm text-stone-600">承認金額</div>
                                </div>
                            </div>
                        </div>

                        <div className="flex items-center gap-4 relative">
                            <Filter size={20} className="text-stone-600" />
                            <div className="flex gap-2 flex-1" role="tablist" aria-label="ステータスフィルタ">
                                {[
                                    { key: 'all', label: 'すべて', count: stats.total },
                                    { key: '未対応', label: '未対応', count: stats.pending },
                                    { key: '承認', label: '承認済み', count: stats.approved },
                                    { key: '却下', label: '却下', count: stats.rejected }
                                ]
                                    .filter(({ key }) => key === 'all' || visibleTabs[key])
                                    .map(({ key, label, count }) => (
                                        <button
                                            key={key}
                                            role="tab"
                                            aria-selected={filter === key}
                                            onClick={() => setFilter(key)}
                                            className={`px-4 py-2 rounded-lg font-medium transition-all focus:outline-none focus:ring-2 focus:ring-amber-500 ${filter === key
                                                ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white shadow-md'
                                                : 'bg-stone-100 text-stone-700 hover:bg-stone-200'
                                                }`}
                                        >
                                            {label}
                                            <span className="ml-2 text-xs opacity-75">({count})</span>
                                        </button>
                                    ))}
                            </div>

                            <div className="relative">
                                <button
                                    type="button"
                                    aria-haspopup="true"
                                    aria-expanded={isTabConfigOpen}
                                    onClick={() => setIsTabConfigOpen(v => !v)}
                                    className="px-3 py-2 bg-stone-100 text-stone-700 rounded-lg border border-stone-200 hover:bg-stone-200 text-sm"
                                >表示切替</button>

                                {isTabConfigOpen && (
                                    <div className="absolute right-0 mt-2 w-56 bg-white border border-stone-200 rounded-xl shadow-xl p-3 z-10">
                                        <div className="text-xs font-semibold text-stone-500 mb-2">表示するタブ</div>
                                        {['未対応', '承認', '却下'].map((k) => (
                                            <label key={k} className="flex items-center gap-2 py-1 text-sm text-stone-700">
                                                <input
                                                    type="checkbox"
                                                    checked={!!visibleTabs[k]}
                                                    onChange={(e) => setVisibleTabs(v => ({ ...v, [k]: e.target.checked }))}
                                                />
                                                {k === '承認' ? '承認済み' : k}
                                            </label>
                                        ))}
                                        <div className="mt-2 text-right">
                                            <button onClick={() => setIsTabConfigOpen(false)} className="px-3 py-1 text-sm text-stone-600 hover:text-stone-800">閉じる</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* テーブル */}
                    <div className="bg-white/80 backdrop-blur border border-stone-200 rounded-2xl p-6 shadow-lg">
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead className="sticky top-0 bg-white">
                                    <tr className="border-b border-stone-200">
                                        {[
                                            { key: 'timestamp', label: '申請日時', align: 'left' },
                                            { key: 'name', label: '申請者', align: 'left' },
                                            { key: 'itemName', label: '商品名', align: 'left' },
                                            { key: 'quantity', label: '数量', align: 'left' },
                                            { key: 'totalPrice', label: '金額', align: 'right' },
                                            { key: 'status', label: 'ステータス', align: 'center' },
                                        ].map(({ key, label, align }) => (
                                            <th
                                                key={key}
                                                onClick={() => handleSort(key)}
                                                className={`px-6 py-4 text-${align} text-xs font-semibold text-stone-600 uppercase tracking-wider cursor-pointer hover:bg-stone-100 transition-colors`}
                                            >
                                                <div className={`flex items-center gap-2 ${align === 'right' ? 'justify-end' : 'justify-start'}`}>
                                                    <span>{label}</span>
                                                    {sortConfig.key === key && (
                                                        <span className="text-amber-600">
                                                            {sortConfig.direction === 'ascending' ? (
                                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6" /></svg>
                                                            ) : (
                                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6" /></svg>
                                                            )}
                                                        </span>
                                                    )}
                                                </div>
                                            </th>
                                        ))}
                                        <th className="px-6 py-4 text-center text-xs font-semibold text-stone-600 uppercase tracking-wider">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sortedAndFilteredApps.map((app) => (
                                        <tr
                                            key={app.rowIndex}
                                            className="border-b border-stone-100 hover:bg-amber-50/50 transition-colors cursor-pointer"
                                            onClick={() => setSelectedApp(app)}
                                        >
                                            <td className="px-6 py-4 text-sm text-stone-600">
                                                {formatDate(app.timestamp)}
                                            </td>
                                            <td className="px-6 py-4">
                                                <div className="font-medium text-stone-800">{app.name}</div>
                                                <div className="text-xs text-stone-500">{app.department}</div>
                                            </td>
                                            <td className="px-6 py-4">
                                                <div className="font-medium text-stone-800">{app.itemName}</div>
                                            </td>
                                            <td className="px-6 py-4 text-stone-700">{app.quantity}個</td>
                                            <td className="px-6 py-4 text-right">
                                                <div className="font-semibold text-stone-800">¥{app.totalPrice.toLocaleString()}</div>
                                            </td>
                                            <td className="px-6 py-4 text-center">
                                                <StatusBadge status={app.status} />
                                            </td>
                                            <td className="px-6 py-4 text-center">
                                                <button
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        setSelectedApp(app);
                                                    }}
                                                    className="px-4 py-2 bg-amber-100 hover:bg-amber-200 text-amber-800 rounded-lg transition-colors text-sm font-medium border border-amber-300"
                                                >
                                                    詳細
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {sortedAndFilteredApps.length === 0 && (
                        <div className="text-center py-20">
                            <div className="text-6xl mb-4">🔍</div>
                            <p className="text-stone-500">該当する申請がありません</p>
                        </div>
                    )}
                    </div>

                    {/* 詳細モーダル */ }
            {
                selectedApp && (
                    <div
                        className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-8 z-50"
                        onClick={() => { setSelectedApp(null); setIsPreviewingPdf(false); }}
                    >
                        <div
                            className="bg-white rounded-3xl shadow-2xl max-w-5xl w-full h-[90vh] overflow-hidden border-4 border-stone-200 flex flex-col"
                            onClick={(e) => e.stopPropagation()}
                        >
                            <div className="p-8 pb-0 flex-shrink-0">
                                <button
                                    onClick={() => { setSelectedApp(null); setIsPreviewingPdf(false); }}
                                    className="absolute top-8 right-8 w-10 h-10 bg-stone-100 hover:bg-stone-200 rounded-lg flex items-center justify-center text-stone-700 transition-colors z-10"
                                >
                                    <X size={20} />
                                </button>
                                <div className="mb-8">
                                    <h2 className="text-3xl font-bold text-stone-800 mb-2">{selectedApp.itemName}</h2>
                                    <div className="flex items-center gap-4 text-sm text-stone-600">
                                        <span>{selectedApp.name}</span>
                                        <span>•</span>
                                        <span>{selectedApp.department}</span>
                                        <span>•</span>
                                        <span>{formatDate(selectedApp.timestamp)}</span>
                                    </div>
                                </div>
                            </div>

                            {isPreviewingPdf ? (
                                <div className="flex-grow flex flex-col h-full">
                                    <div className="px-8 pb-4">
                                        <button onClick={() => setIsPreviewingPdf(false)} className="px-4 py-2 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-lg transition-colors text-sm font-medium">← 詳細に戻る</button>
                                    </div>
                                    <iframe
                                        src={`https://drive.google.com/file/d/${getDriveFileId(selectedApp.fileInfo.url)}/preview`}
                                        className="w-full h-full border-t-2 border-stone-200"
                                    ></iframe>
                                </div>
                            ) : (
                                <div className="p-8 pt-0 overflow-y-auto">
                                    <div className="grid grid-cols-2 gap-8 mb-8">
                                        <div className="bg-stone-50 border-2 border-stone-200 rounded-2xl p-6">
                                            <h3 className="text-sm font-semibold text-stone-600 uppercase tracking-wide mb-4">申請情報</h3>
                                            <div className="space-y-4">
                                                <div className="flex justify-between items-center py-3 border-b border-stone-200">
                                                    <span className="text-sm text-stone-600">数量</span>
                                                    <span className="font-semibold text-stone-800">{selectedApp.quantity}個</span>
                                                </div>
                                                <div className="flex justify-between items-center py-3 border-b border-stone-200">
                                                    <span className="text-sm text-stone-600">単価</span>
                                                    <span className="font-semibold text-stone-800">¥{selectedApp.unitPrice.toLocaleString()}</span>
                                                </div>
                                                <div className="flex justify-between items-center py-3 border-b border-stone-200">
                                                    <span className="text-sm text-stone-600">合計金額</span>
                                                    <span className="font-semibold text-2xl text-transparent bg-clip-text bg-gradient-to-r from-amber-700 to-orange-700">¥{selectedApp.totalPrice.toLocaleString()}</span>
                                                </div>
                                                <div className="flex justify-between items-center py-3 border-b border-stone-200">
                                                    <span className="text-sm text-stone-600">ステータス</span>
                                                    <StatusBadge status={selectedApp.status} />
                                                </div>
                                                {selectedApp.productUrl && (
                                                    <div className="flex justify-between items-center py-3 border-b border-stone-200">
                                                        <span className="text-sm text-stone-600">商品URL</span>
                                                        <a href={selectedApp.productUrl} target="_blank" rel="noopener noreferrer" className="font-semibold text-amber-700 hover:underline truncate max-w-[200px]">{selectedApp.productUrl}</a>
                                                    </div>
                                                )}
                                            </div>
                                            {selectedApp.reason && (
                                                <div className="mt-6">
                                                    <h3 className="text-sm font-semibold text-stone-600 uppercase tracking-wide mb-2">購入理由</h3>
                                                    <p className="text-stone-700 leading-relaxed">{selectedApp.reason}</p>
                                                </div>
                                            )}
                                        </div>

                                        <div className="bg-stone-50 border-2 border-stone-200 rounded-2xl p-6">
                                            <h3 className="text-sm font-semibold text-stone-600 uppercase tracking-wide mb-4">添付ファイル</h3>
                                            {selectedApp.fileInfo ? (
                                                <div className="space-y-4">
                                                    <div className="flex items-center gap-4 bg-stone-100 p-4 rounded-xl border border-stone-200">
                                                        <div className="text-4xl">📄</div>
                                                        <div className="flex-1 min-w-0">
                                                            <div className="font-medium text-stone-800 truncate">{selectedApp.fileInfo.name}</div>
                                                            <div className="text-sm text-stone-600">{selectedApp.fileInfo.size}</div>
                                                        </div>
                                                        <button onClick={() => setIsPreviewingPdf(true)} className="px-4 py-2 bg-amber-100 hover:bg-amber-200 text-amber-800 rounded-lg transition-colors text-sm font-medium border border-amber-300">プレビュー</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="text-center py-12 text-stone-400 border-2 border-dashed border-stone-200 rounded-xl">
                                                    <div className="text-4xl mb-2">📎</div>
                                                    <p>添付ファイルなし</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {selectedApp.status === '未対応' && selectedApp.approver === currentUser.name && (
                                        <div className="bg-stone-50 border-2 border-stone-200 rounded-2xl p-6">
                                            <h3 className="text-sm font-semibold text-stone-600 uppercase tracking-wide mb-4">承認アクション</h3>
                                            <input
                                                type="text"
                                                placeholder="コメントを入力（任意）"
                                                value={comment}
                                                onChange={(e) => setComment(e.target.value)}
                                                className="w-full px-4 py-3 bg-white border-2 border-stone-200 rounded-xl text-stone-800 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-500 mb-4"
                                                disabled={isDecisionLoading}
                                            />
                                            <div className="grid grid-cols-2 gap-4">
                                                <button
                                                    onClick={handleApprove}
                                                    className="px-6 py-4 bg-gradient-to-r from-emerald-600 to-green-600 text-white rounded-xl font-semibold hover:from-emerald-700 hover:to-green-700 transition-all shadow-lg disabled:opacity-50 disabled:cursor-not-allowed"
                                                    disabled={isDecisionLoading}
                                                >
                                                    {isDecisionLoading ? '処理中...' : '✓ 承認する'}
                                                </button>
                                                <button
                                                    onClick={handleReject}
                                                    className="px-6 py-4 bg-gradient-to-r from-rose-600 to-red-600 text-white rounded-xl font-semibold hover:from-rose-700 hover:to-red-700 transition-all shadow-lg disabled:opacity-50 disabled:cursor-not-allowed"
                                                    disabled={isDecisionLoading}
                                                >
                                                    {isDecisionLoading ? '処理中...' : '✗ 却下する'}
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                )
            }

            {
                isNewAppFormOpen && (
                    <NewApplicationForm
                        onClose={() => setIsNewAppFormOpen(false)}
                        onSubmit={handleNewApplication}
                        currentUser={currentUser}
                        approvers={approvers}
                    />
                )
            }
                </>
            );
        }

        function NewApplicationForm({ onClose, onSubmit, currentUser, approvers }) {
            const [itemName, setItemName] = useState('');
            const [quantity, setQuantity] = useState('');
            const [unitPrice, setUnitPrice] = useState('');
            const [reason, setReason] = useState('');
            const [productUrl, setProductUrl] = useState('');
            const [selectedApprover, setSelectedApprover] = useState('');
            const [file, setFile] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const totalPrice = quantity * unitPrice;

            useEffect(() => {
                if (approvers && approvers.length > 0 && !selectedApprover) {
                    setSelectedApprover(approvers[0]);
                }
            }, [approvers, selectedApprover]);

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile && selectedFile.type === 'application/pdf') {
                    setFile(selectedFile);
                } else {
                    pushToast('info', 'PDFファイルを選択してください');
                    e.target.value = null;
                    setFile(null);
                }
            };

            const handleSubmit = () => {
                setIsSubmitting(true);
                const onSubmissionComplete = () => setIsSubmitting(false);

                const data = {
                    name: currentUser.name,
                    department: currentUser.department,
                    itemName,
                    quantity,
                    unitPrice,
                    totalPrice,
                    reason,
                    productUrl,
                    selectedApprover,
                    file: null
                };

                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        data.file = {
                            name: file.name,
                            mimeType: file.type,
                            data: e.target.result.split(',')[1]
                        };
                        onSubmit(data, onSubmissionComplete);
                    };
                    reader.readAsDataURL(file);
                } else {
                    onSubmit(data, onSubmissionComplete);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-8 z-50" onClick={onClose}>
                    <div className="bg-white rounded-3xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden border-4 border-stone-200 flex flex-col" onClick={(e) => e.stopPropagation()}>
                        <div className="p-8 pb-4 flex-shrink-0">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-bold text-stone-800">新規購入申請</h2>
                                <button onClick={onClose} className="w-10 h-10 bg-stone-100 hover:bg-stone-200 rounded-lg flex items-center justify-center text-stone-700 transition-colors">
                                    <X size={20} />
                                </button>
                            </div>
                        </div>
                        <div className="px-8 pb-8 overflow-y-auto">
                            <div className="space-y-6">
                                <div>
                                    <label className="text-sm font-semibold text-stone-600 mb-2 block">承認者</label>
                                    <select
                                        value={selectedApprover}
                                        onChange={(e) => setSelectedApprover(e.target.value)}
                                        className="w-full px-4 py-3 bg-amber-50 border-2 border-amber-200 rounded-xl text-amber-900 font-semibold focus:outline-none focus:ring-2 focus:ring-amber-500 appearance-none"
                                        style={{ backgroundImage: `url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2378350f' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e")`, backgroundPosition: 'right 0.5rem center', backgroundRepeat: 'no-repeat', backgroundSize: '1.5em 1.5em' }}
                                    >
                                        {approvers.map(approver => <option key={approver} value={approver}>{approver}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-sm font-semibold text-stone-600 mb-2 block">商品名</label>
                                    <input type="text" value={itemName} onChange={(e) => setItemName(e.target.value)} placeholder="例：高機能オフィスチェア" className="w-full px-4 py-3 bg-white border-2 border-stone-200 rounded-xl text-stone-800 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-500" />
                                </div>
                                <div>
                                    <label className="text-sm font-semibold text-stone-600 mb-2 block">購入商品URL</label>
                                    <input type="url" value={productUrl} onChange={(e) => setProductUrl(e.target.value)} placeholder="https://example.com/product/123" className="w-full px-4 py-3 bg-white border-2 border-stone-200 rounded-xl text-stone-800 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-500" />
                                </div>
                                <div className="grid grid-cols-2 gap-6">
                                    <div>
                                        <label className="text-sm font-semibold text-stone-600 mb-2 block">数量</label>
                                        <input type="number" value={quantity} onChange={(e) => setQuantity(Number(e.target.value))} placeholder="0" className="w-full px-4 py-3 bg-white border-2 border-stone-200 rounded-xl text-stone-800 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-500" />
                                    </div>
                                    <div>
                                        <label className="text-sm font-semibold text-stone-600 mb-2 block">単価</label>
                                        <div className="relative">
                                            <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-stone-500">¥</span>
                                            <input type="number" value={unitPrice} onChange={(e) => setUnitPrice(Number(e.target.value))} placeholder="0" className="w-full pl-8 pr-4 py-3 bg-white border-2 border-stone-200 rounded-xl text-stone-800 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-500" />
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-stone-50 border-2 border-stone-200 rounded-2xl p-4 text-right">
                                    <span className="text-sm text-stone-600">合計金額</span>
                                    <p className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-700 to-orange-700">¥{totalPrice.toLocaleString()}</p>
                                </div>
                                <div>
                                    <label className="text-sm font-semibold text-stone-600 mb-2 block">購入理由</label>
                                    <textarea value={reason} onChange={(e) => setReason(e.target.value)} rows="4" placeholder="例：腰痛改善のため、現在の椅子の買い替え" className="w-full px-4 py-3 bg-white border-2 border-stone-200 rounded-xl text-stone-800 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                                </div>
                                <div>
                                    <label className="text-sm font-semibold text-stone-600 mb-2 block">添付ファイル (PDF)</label>
                                    <input type="file" accept=".pdf" onChange={handleFileChange} className="w-full text-sm text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-amber-50 file:text-amber-700 hover:file:bg-amber-100" />
                                </div>
                            </div>
                        </div>
                        <div className="p-8 pt-6 mt-auto bg-white border-t-2 border-stone-100 flex justify-end gap-4">
                            <button onClick={onClose} className="px-6 py-3 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-xl font-semibold transition-colors" disabled={isSubmitting}>キャンセル</button>
                            <button onClick={handleSubmit} className="px-6 py-3 bg-gradient-to-r from-amber-600 to-orange-600 text-white rounded-xl font-semibold hover:from-amber-700 hover:to-orange-700 transition-all shadow-lg disabled:opacity-50 disabled:cursor-not-allowed" disabled={isSubmitting}>{isSubmitting ? '保存中...' : '申請する'}</button>
                        </div>
                    </div>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
